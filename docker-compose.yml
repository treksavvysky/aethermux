# AetherMux — local development stack.
#
#   docker compose up --build
#
# Brings up PostgreSQL and the orchestrator. The orchestrator mounts the host
# Docker socket so it can provision *sibling* sandbox containers on the host
# daemon (Phase 1 is a single-process, socket-driven orchestrator — not DinD).
#
# Because sandboxes are created on the host daemon, their bind-mounted workspace
# directory must be a path that exists on the HOST. AETHERMUX_WORKSPACE_ROOT is
# set to a host directory that is also mounted into the orchestrator container at
# the same path, so the path means the same thing on both sides.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aethermux
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  orchestrator:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/aethermux
      AETHERMUX_WORKSPACE_ROOT: /srv/aethermux/workspaces
      AETHERMUX_SANDBOX_IMAGE: alpine:3.20
    ports:
      - "8080:8080"
    volumes:
      # Docker socket binding: lets the orchestrator create sibling sandboxes.
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared workspace root — same path on host and in the container so host
      # bind mounts for sandboxes resolve correctly.
      - /srv/aethermux/workspaces:/srv/aethermux/workspaces

volumes:
  pgdata:
