name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # This job's name ("ci") IS the required status-check context on main's branch
  # protection. The CI job name and main's required_status_checks.contexts are
  # one contract — change them together. See DECISIONS.md (ADR-0002).
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aethermux_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          AETHERMUX_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/aethermux_test
